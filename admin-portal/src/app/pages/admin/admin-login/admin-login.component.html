<div class="admin-login-container" >
  <div class="login-card">
    <div class="text-center mb-4">
      <span class="badge-read-only">{{ 'admin.readOnlyBadge' | translate }}</span>
      <h2 class="mb-1">{{ 'admin.login' | translate }}</h2>
      <p class="text-muted">{{ 'app.title' | translate }}</p>
    </div>

    <div *ngIf="errorMessage" class="alert-danger">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="email">{{ 'admin.email' | translate }}</label>
        <input 
          type="email" 
          id="email" 
          class="form-control" 
          formControlName="email"
          [class.is-invalid]="isFieldInvalid('email')">
        <div *ngIf="isFieldInvalid('email')" class="text-danger">
          {{ 'validation.emailInvalid' | translate }}
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">{{ 'admin.password' | translate }}</label>
        <input 
          type="password" 
          id="password" 
          class="form-control" 
          formControlName="password"
          [class.is-invalid]="isFieldInvalid('password')">
        <div *ngIf="isFieldInvalid('password')" class="text-danger">
          {{ 'validation.passwordMin' | translate }}
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? ('common.loading' | translate) : ('admin.loginButton' | translate) }}
      </button>
    </form>
  </div>
</div>
