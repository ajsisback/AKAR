services:
  postgres:
    image: postgres:17
    container_name: akar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-akar_db}
      POSTGRES_USER: ${POSTGRES_USER:-akar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-akar_pass_2026}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - akar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akar_user} -d ${POSTGRES_DB:-akar_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  akar_pgdata:
    driver: local
